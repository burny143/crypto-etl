<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon@1"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; padding: 24px; }
        h1 { font-size: 24px; margin-bottom: 4px; color: #f8fafc; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
        .subtitle { font-size: 13px; color: #64748b; margin-bottom: 20px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
        .subtitle .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }

        #errorBanner { display: none; background: #450a0a; border: 1px solid #ef4444; color: #fecaca; padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }

        .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .stat { background: #1e293b; border-radius: 12px; padding: 14px 16px; border: 1px solid #334155; }
        .stat .label { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: .04em; }
        .stat .value { font-size: 20px; font-weight: 700; margin-top: 4px; color: #f8fafc; }
        .stat .sub { font-size: 12px; margin-top: 2px; color: #94a3b8; }

        .toolbar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .toolbar input[type="text"], .toolbar select { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; font-size: 14px; }
        .toolbar input[type="text"] { flex: 1; min-width: 160px; }
        .toolbar button { background: #3b82f6; color: white; border: none; border-radius: 8px; padding: 8px 14px; font-size: 14px; cursor: pointer; font-weight: 600; }
        .toolbar button:hover { background: #2563eb; }
        .toolbar button.secondary { background: #334155; }
        .toolbar button.secondary:hover { background: #475569; }
        .toolbar label.toggle { font-size: 13px; color: #94a3b8; display: flex; align-items: center; gap: 6px; cursor: pointer; }

        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card { background: #1e293b; border-radius: 12px; padding: 16px; border: 1px solid #334155; cursor: pointer; transition: border-color .15s; }
        .card:hover { border-color: #3b82f6; }
        .card.selected { border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
        .card .name { font-size: 14px; color: #94a3b8; }
        .card .price { font-size: 28px; font-weight: 700; margin: 4px 0; }
        .card .change { font-size: 14px; }
        .card .mcap { font-size: 12px; color: #64748b; margin-top: 8px; }
        .up { color: #22c55e; }
        .down { color: #ef4444; }
        .empty-note { grid-column: 1/-1; text-align: center; color: #94a3b8; padding: 24px; }

        .controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
        .controls select { background: #1e293b; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 8px 12px; font-size: 14px; }
        .controls label { font-size: 14px; color: #94a3b8; align-self: center; }

        .range-stats { display: flex; gap: 20px; margin-bottom: 16px; flex-wrap: wrap; }
        .range-stats .item { font-size: 13px; color: #94a3b8; }
        .range-stats .item b { color: #f8fafc; font-size: 15px; display: block; }

        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .chart-box { background: #1e293b; border-radius: 12px; padding: 16px; border: 1px solid #334155; position: relative; min-height: 340px; }
        .chart-box h3 { font-size: 14px; color: #94a3b8; margin-bottom: 12px; }
        .chart-box canvas { width: 100% !important; height: 300px !important; }
        .chart-box .loading, .chart-box .empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: #64748b; font-size: 13px; }
        .full-width { grid-column: 1 / -1; }
        @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <h1>Crypto Dashboard <span class="dot" id="liveDot" style="display:none;"></span></h1>
    <div class="subtitle">
        <span id="lastUpdated">Not loaded yet</span>
        <label class="toggle"><input type="checkbox" id="autoRefreshToggle"> Auto-refresh every 30s</label>
    </div>

    <div id="errorBanner"></div>

    <div class="stats-bar" id="statsBar"></div>

    <div class="toolbar">
        <input type="text" id="searchInput" placeholder="Search coins by name or symbol...">
        <select id="sortSelect">
            <option value="mcap_desc">Sort: Market Cap (high-low)</option>
            <option value="price_desc">Sort: Price (high-low)</option>
            <option value="change_desc">Sort: 24h Change (high-low)</option>
            <option value="change_asc">Sort: 24h Change (low-high)</option>
            <option value="name_asc">Sort: Name (A-Z)</option>
        </select>
        <button class="secondary" id="refreshBtn">Refresh now</button>
    </div>

    <div class="cards" id="priceCards"></div>

    <div class="controls">
        <label>Symbol:</label>
        <select id="symbolSelect"></select>
        <label>Timeframe:</label>
        <select id="timeframeSelect">
            <option value="1h">1 Hour</option>
            <option value="4h">4 Hours</option>
            <option value="1d" selected>1 Day</option>
        </select>
    </div>

    <div class="range-stats" id="rangeStats"></div>

    <div class="charts">
        <div class="chart-box full-width">
            <h3>Closing Price</h3>
            <canvas id="lineChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Candlestick</h3>
            <canvas id="candleChart"></canvas>
        </div>
        <div class="chart-box">
            <h3>Volume</h3>
            <canvas id="volumeChart"></canvas>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://YOUR_PROJECT.supabase.co";
        const SUPABASE_ANON_KEY = "YOUR_ANON_KEY";

        // NOTE: we check SUPABASE_ANON_KEY.length here instead of .includes("YOUR_ANON_KEY").
        // The GitHub Actions workflow's `sed -i "s|YOUR_ANON_KEY|...|g"` replaces EVERY
        // occurrence of that literal string in the file -- including the one inside this
        // check itself. That made the check self-matching: after injection it became
        // `SUPABASE_ANON_KEY.includes(SUPABASE_ANON_KEY)`, which is always true, so the
        // placeholder screen showed up no matter what key was injected. A length check
        // isn't touched by that sed replacement, since real Supabase keys are much longer
        // than the 13-character placeholder string.
        if (SUPABASE_URL.includes("YOUR_PROJECT") || SUPABASE_ANON_KEY.length < 20) {
            document.body.innerHTML = `
                <div style="background:#1e293b;border-radius:12px;padding:32px;max-width:600px;margin:40px auto;text-align:center;">
                    <h2 style="margin-bottom:16px;">Configure Supabase</h2>
                    <p style="color:#94a3b8;margin-bottom:24px;">
                        Open <code style="background:#0f172a;padding:2px 6px;border-radius:4px;">index.html</code>
                        and replace <code style="background:#0f172a;padding:2px 6px;border-radius:4px;">SUPABASE_URL</code>
                        and <code style="background:#0f172a;padding:2px 6px;border-radius:4px;">SUPABASE_ANON_KEY</code>
                        with your Supabase project credentials.
                    </p>
                    <p style="color:#64748b;font-size:14px;">
                        You can find them in your Supabase dashboard under Settings → API.
                    </p>
                    <p style="color:#64748b;font-size:14px;margin-top:12px;">
                        Or push to <code style="background:#0f172a;padding:2px 6px;border-radius:4px;">main</code> and the
                        <strong>Deploy Dashboard</strong> workflow will inject them automatically via GitHub Pages.
                    </p>
                </div>
            `;
        } else {
            init();
        }

        async function init() {
            // FIX: the Supabase CDN bundle exposes itself as the global `supabase` object
            // (with a .createClient method), not `supabaseJs`. Grab createClient off of it
            // BEFORE we shadow the name with our own local `supabaseClient` variable.
            const { createClient } = supabase;
            const supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            const symbolSelect = document.getElementById("symbolSelect");
            const timeframeSelect = document.getElementById("timeframeSelect");
            const searchInput = document.getElementById("searchInput");
            const sortSelect = document.getElementById("sortSelect");
            const refreshBtn = document.getElementById("refreshBtn");
            const autoRefreshToggle = document.getElementById("autoRefreshToggle");
            const errorBanner = document.getElementById("errorBanner");
            const lastUpdatedEl = document.getElementById("lastUpdated");
            const liveDot = document.getElementById("liveDot");

            let currentSymbol = "";
            let currentTimeframe = "1d";
            let cardData = [];
            let chartInstances = {};
            let autoRefreshTimer = null;

            function showError(msg) {
                errorBanner.style.display = "block";
                errorBanner.textContent = msg;
                console.error(msg);
            }
            function clearError() {
                errorBanner.style.display = "none";
                errorBanner.textContent = "";
            }

            function formatMoney(n) {
                if (n === null || n === undefined || isNaN(n)) return "N/A";
                if (Math.abs(n) >= 1e12) return "$" + (n / 1e12).toFixed(2) + "T";
                if (Math.abs(n) >= 1e9) return "$" + (n / 1e9).toFixed(2) + "B";
                if (Math.abs(n) >= 1e6) return "$" + (n / 1e6).toFixed(2) + "M";
                return "$" + n.toLocaleString();
            }

            function setLastUpdated() {
                lastUpdatedEl.textContent = "Last updated: " + new Date().toLocaleTimeString();
            }

            function destroyCharts() {
                Object.values(chartInstances).forEach(c => { if (c) c.destroy(); });
                chartInstances = {};
            }

            function setChartState(boxId, state) {
                // state: 'loading' | 'empty' | null
                const box = document.querySelector(`#${boxId}`).closest(".chart-box");
                let overlay = box.querySelector(".state-overlay");
                if (overlay) overlay.remove();
                if (state === "loading") {
                    box.insertAdjacentHTML("beforeend", `<div class="state-overlay loading">Loading...</div>`);
                } else if (state === "empty") {
                    box.insertAdjacentHTML("beforeend", `<div class="state-overlay empty">No data for this symbol/timeframe</div>`);
                }
            }

            function renderStatsBar(data) {
                const bar = document.getElementById("statsBar");
                if (!data || data.length === 0) {
                    bar.innerHTML = "";
                    return;
                }
                const totalMcap = data.reduce((sum, c) => sum + (c.market_cap || 0), 0);
                let best = null, worst = null;
                data.forEach(c => {
                    if (!c.previous_close) return;
                    const pct = ((c.current_price - c.previous_close) / c.previous_close) * 100;
                    if (!best || pct > best.pct) best = { symbol: c.symbol || c.name, pct };
                    if (!worst || pct < worst.pct) worst = { symbol: c.symbol || c.name, pct };
                });
                bar.innerHTML = `
                    <div class="stat">
                        <div class="label">Assets tracked</div>
                        <div class="value">${data.length}</div>
                    </div>
                    <div class="stat">
                        <div class="label">Combined market cap</div>
                        <div class="value">${formatMoney(totalMcap)}</div>
                    </div>
                    <div class="stat">
                        <div class="label">Best 24h performer</div>
                        <div class="value up">${best ? best.symbol : "N/A"}</div>
                        <div class="sub">${best ? best.pct.toFixed(2) + "%" : ""}</div>
                    </div>
                    <div class="stat">
                        <div class="label">Worst 24h performer</div>
                        <div class="value down">${worst ? worst.symbol : "N/A"}</div>
                        <div class="sub">${worst ? worst.pct.toFixed(2) + "%" : ""}</div>
                    </div>
                `;
            }

            function renderCards() {
                const container = document.getElementById("priceCards");
                let list = [...cardData];

                const query = searchInput.value.trim().toLowerCase();
                if (query) {
                    list = list.filter(c =>
                        (c.name || "").toLowerCase().includes(query) ||
                        (c.symbol || "").toLowerCase().includes(query)
                    );
                }

                const sortMode = sortSelect.value;
                list.sort((a, b) => {
                    const pctA = a.previous_close ? (a.current_price - a.previous_close) / a.previous_close : 0;
                    const pctB = b.previous_close ? (b.current_price - b.previous_close) / b.previous_close : 0;
                    switch (sortMode) {
                        case "price_desc": return (b.current_price || 0) - (a.current_price || 0);
                        case "change_desc": return pctB - pctA;
                        case "change_asc": return pctA - pctB;
                        case "name_asc": return (a.name || a.symbol || "").localeCompare(b.name || b.symbol || "");
                        case "mcap_desc":
                        default: return (b.market_cap || 0) - (a.market_cap || 0);
                    }
                });

                if (list.length === 0) {
                    container.innerHTML = `<div class="empty-note">No coins match your search, or no data loaded yet.</div>`;
                    return;
                }

                container.innerHTML = list.map(c => {
                    const hasPrev = c.previous_close !== null && c.previous_close !== undefined && c.previous_close !== 0;
                    const change = hasPrev ? c.current_price - c.previous_close : null;
                    const pct = hasPrev ? ((change / c.previous_close) * 100).toFixed(2) : null;
                    const cls = hasPrev ? (change >= 0 ? "up" : "down") : "";
                    const changeLabel = hasPrev ? `${change >= 0 ? "+" : ""}${pct}%` : "N/A";
                    const isSelected = c.symbol === currentSymbol;
                    return `
                        <div class="card ${isSelected ? "selected" : ""}" data-symbol="${c.symbol}">
                            <div class="name">${c.name || c.symbol}</div>
                            <div class="price">$${(c.current_price ?? 0).toLocaleString()}</div>
                            <div class="change ${cls}">${changeLabel}</div>
                            <div class="mcap">Market Cap: ${formatMoney(c.market_cap)}</div>
                        </div>
                    `;
                }).join("");

                container.querySelectorAll(".card").forEach(el => {
                    el.addEventListener("click", () => {
                        const sym = el.getAttribute("data-symbol");
                        if (symbolSelect.querySelector(`option[value="${sym}"]`)) {
                            currentSymbol = sym;
                            symbolSelect.value = sym;
                            loadCharts();
                            renderCards();
                        }
                    });
                });
            }

            async function loadCards() {
                const { data, error } = await supabaseClient.from("crypto_data").select("*");
                if (error) {
                    showError("Failed to load crypto_data: " + error.message);
                    cardData = [];
                } else {
                    clearError();
                    cardData = data || [];
                }
                renderStatsBar(cardData);
                renderCards();
            }

            async function loadSymbols() {
                // FIX: previously queried crypto_historical with select("symbol").limit(1000)
                // and no ORDER BY / DISTINCT. Since that table can have many rows per coin
                // (every candle, across every timeframe), the first 1000 raw rows returned
                // could all belong to a single symbol if the ETL writes one coin's full
                // history before moving to the next -- making the dropdown only ever show
                // that one coin. crypto_data has exactly one row per tracked coin (it's what
                // the price cards already use), so building the dropdown from there
                // guarantees every coin you see as a card is also selectable here.
                const { data, error } = await supabaseClient
                    .from("crypto_data")
                    .select("symbol");
                if (error) {
                    showError("Failed to load symbols: " + error.message);
                    return;
                }
                if (data && data.length > 0) {
                    const symbols = [...new Set(data.map(d => d.symbol))].sort();
                    symbolSelect.innerHTML = symbols.map(s => `<option value="${s}">${s}</option>`).join("");
                    if (!currentSymbol || !symbols.includes(currentSymbol)) {
                        currentSymbol = symbols[0];
                    }
                    symbolSelect.value = currentSymbol;
                }
            }

            function renderRangeStats(data) {
                const el = document.getElementById("rangeStats");
                if (!data || data.length === 0) {
                    el.innerHTML = "";
                    return;
                }
                const highs = data.map(d => d.high).filter(v => v !== null && v !== undefined);
                const lows = data.map(d => d.low).filter(v => v !== null && v !== undefined);
                const totalVolume = data.reduce((s, d) => s + (d.volume || 0), 0);
                const periodHigh = highs.length ? Math.max(...highs) : null;
                const periodLow = lows.length ? Math.min(...lows) : null;
                el.innerHTML = `
                    <div class="item">Period high <b>${periodHigh !== null ? "$" + periodHigh.toLocaleString() : "N/A"}</b></div>
                    <div class="item">Period low <b>${periodLow !== null ? "$" + periodLow.toLocaleString() : "N/A"}</b></div>
                    <div class="item">Total volume <b>${formatMoney(totalVolume)}</b></div>
                    <div class="item">Data points <b>${data.length}</b></div>
                `;
            }

            async function loadCharts() {
                if (!currentSymbol) return;
                setChartState("lineChart", "loading");
                setChartState("candleChart", "loading");
                setChartState("volumeChart", "loading");

                const { data, error } = await supabaseClient
                    .from("crypto_historical")
                    .select("*")
                    .eq("symbol", currentSymbol)
                    .eq("timeframe", currentTimeframe)
                    .order("datetime", { ascending: true });

                if (error) {
                    showError("Failed to load chart data: " + error.message);
                    setChartState("lineChart", "empty");
                    setChartState("candleChart", "empty");
                    setChartState("volumeChart", "empty");
                    renderRangeStats([]);
                    return;
                }
                clearError();

                if (!data || data.length === 0) {
                    destroyCharts();
                    setChartState("lineChart", "empty");
                    setChartState("candleChart", "empty");
                    setChartState("volumeChart", "empty");
                    renderRangeStats([]);
                    return;
                }

                // FIX: dedupe by datetime (in case repeated GitHub Actions ETL runs upserted
                // the same candle more than once) and coerce OHLCV fields to numbers. If
                // Supabase/pandas ever stored these as text, comparisons and chart plotting
                // silently misbehave (candles at wrong y-positions, jagged/nonsensical
                // shapes) without throwing an error. Rows missing any OHLC value are dropped
                // rather than plotted as broken candles.
                const dedupMap = new Map();
                data.forEach(d => dedupMap.set(d.datetime, d));
                const cleaned = [...dedupMap.values()]
                    .map(d => ({
                        ...d,
                        open: Number(d.open),
                        high: Number(d.high),
                        low: Number(d.low),
                        close: Number(d.close),
                        volume: Number(d.volume) || 0
                    }))
                    .filter(d => [d.open, d.high, d.low, d.close].every(v => Number.isFinite(v)))
                    .sort((a, b) => new Date(a.datetime) - new Date(b.datetime));

                if (cleaned.length === 0) {
                    setChartState("lineChart", "empty");
                    setChartState("candleChart", "empty");
                    setChartState("volumeChart", "empty");
                    renderRangeStats([]);
                    return;
                }

                setChartState("lineChart", null);
                setChartState("candleChart", null);
                setChartState("volumeChart", null);
                renderRangeStats(cleaned);
                destroyCharts();

                const dates = cleaned.map(d => new Date(d.datetime).toLocaleDateString());
                const closes = cleaned.map(d => d.close);
                const volumes = cleaned.map(d => d.volume || 0);

                const lineCtx = document.getElementById("lineChart").getContext("2d");
                chartInstances.line = new Chart(lineCtx, {
                    type: "line",
                    data: { labels: dates, datasets: [{ label: "Close", data: closes, borderColor: "#3b82f6", backgroundColor: "rgba(59,130,246,0.1)", fill: true, tension: 0.3, pointRadius: 0 }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 10, color: "#64748b" } }, y: { ticks: { color: "#64748b" } } } }
                });

                const volCtx = document.getElementById("volumeChart").getContext("2d");
                chartInstances.volume = new Chart(volCtx, {
                    type: "bar",
                    data: { labels: dates, datasets: [{ label: "Volume", data: volumes, backgroundColor: "rgba(59,130,246,0.5)" }] },
                    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { x: { ticks: { maxTicksLimit: 10, color: "#64748b" } }, y: { ticks: { color: "#64748b" } } } }
                });

                const candleCtx = document.getElementById("candleChart").getContext("2d");
                const candleData = cleaned.slice(-60).map(d => ({
                    x: new Date(d.datetime),
                    o: d.open,
                    h: d.high,
                    l: d.low,
                    c: d.close
                }));

                chartInstances.candle = new Chart(candleCtx, {
                    type: "candlestick",
                    data: {
                        datasets: [{
                            label: currentSymbol,
                            data: candleData,
                            color: {
                                up: "#22c55e",
                                down: "#ef4444",
                                unchanged: "#94a3b8"
                            }
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            x: {
                                type: "time",
                                time: { displayFormats: { day: "MMM d", hour: "MMM d HH:mm" } },
                                ticks: { maxTicksLimit: 10, color: "#64748b" }
                            },
                            y: { ticks: { color: "#64748b" } }
                        }
                    }
                });
            }

            async function refreshAll() {
                await Promise.all([loadCards(), loadCharts()]);
                setLastUpdated();
            }

            symbolSelect.addEventListener("change", () => { currentSymbol = symbolSelect.value; loadCharts(); renderCards(); });
            timeframeSelect.addEventListener("change", () => { currentTimeframe = timeframeSelect.value; loadCharts(); });
            searchInput.addEventListener("input", renderCards);
            sortSelect.addEventListener("change", renderCards);
            refreshBtn.addEventListener("click", refreshAll);

            autoRefreshToggle.addEventListener("change", () => {
                if (autoRefreshToggle.checked) {
                    autoRefreshTimer = setInterval(refreshAll, 30000);
                } else {
                    clearInterval(autoRefreshTimer);
                    autoRefreshTimer = null;
                }
            });

            // Live updates: reflect DB changes to crypto_data instantly without polling.
            supabaseClient
                .channel("crypto_data_changes")
                .on("postgres_changes", { event: "*", schema: "public", table: "crypto_data" }, () => {
                    liveDot.style.display = "inline-block";
                    loadCards();
                    setLastUpdated();
                })
                .subscribe();

            await loadSymbols();
            await refreshAll();
        }
    </script>
</body>
</html>
